version: '3.9'

services:
  api:
    container_name: portfolio-backend

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - '5000:5000'

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
